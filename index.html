<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Ulang Tahun Naeli 🎀</title>

<style>
:root{
  --pink:#ff6fae;
  --soft:#ffeaf2;
  --deep:#ff3d8b;
}

body{
  margin:0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#ffeaf2,#ffd6e7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* CARD */
.card{
  width:90%;
  max-width:320px;
  padding:25px;
  border-radius:25px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.6);
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
  animation:fadeIn 0.5s ease;
}
.hidden{display:none;}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,var(--pink),var(--deep));
  color:white;
  cursor:pointer;
  transition:0.3s;
}
button:hover{transform:scale(1.05);}

/* FOTO */
.foto{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 15px pink;
}

/* COUNTDOWN */
.count{
  font-size:60px;
  font-weight:bold;
  color:var(--deep);
}

/* PROGRESS */
.bar{
  height:6px;
  background:#ffd1e5;
  border-radius:10px;
  margin-bottom:10px;
  overflow:hidden;
}
.fill{
  height:100%;
  width:0%;
  background:var(--deep);
  transition:0.4s;
}

/* HEARTS */
.heart{
  position:fixed;
  bottom:-10px;
  font-size:16px;
  animation:float 6s linear infinite;
}
@keyframes float{
  to{transform:translateY(-110vh);}
}

/* FLOWER */
.flower{
  font-size:50px;
  animation:bloom 1s infinite alternate;
}
@keyframes bloom{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}

/* TEXT */
.typing{
  min-height:40px;
}

/* STAR */
.star{
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<audio id="musik" autoplay loop>
<source src="https://files.catbox.moe/9l4k7v.mp3">
</audio>

<script>
/* HEART FLOAT */
for(let i=0;i<15;i++){
 let h=document.createElement("div");
 h.innerHTML="💖";
 h.className="heart";
 h.style.left=Math.random()*100+"%";
 h.style.animationDuration=(4+Math.random()*4)+"s";
 document.body.appendChild(h);
}
</script>

<!-- STEP -->
<div class="card" id="step1">
<div class="bar"><div class="fill" id="p1"></div></div>
<h3>💌 Hai kamu</h3>
<p>Ada sesuatu spesial 😳</p>
<button onclick="next(2)">Buka</button>
</div>

<div class="card hidden" id="step2">
<div class="bar"><div class="fill" id="p2"></div></div>
<h3>Masukkan Nama 🎀</h3>
<input id="nama">
<br>
<button onclick="start()">OK</button>
</div>

<div class="card hidden" id="step3">
<div class="count" id="count"></div>
</div>

<div class="card hidden" id="step4">
<img src="photo.jpeg" class="foto">
<p id="t1" class="typing"></p>
<button onclick="next(5)">Lanjut</button>
</div>

<div class="card hidden" id="step5">
<p>Klik 5 bintang ⭐</p>
<div id="stars"></div>
</div>

<div class="card hidden" id="step6">
<p>Loading... ✨</p>
</div>

<div class="card hidden" id="step7">
<div class="flower">🌸</div>
<p id="t2"></p>
<button onclick="next(8)">Lanjut</button>
</div>

<div class="card hidden" id="step8">
<h2>🎉 Sampai Jumpa 🎉</h2>
<button onclick="toggle()">🔊 Musik</button>
</div>

<script>
let nama="",star=0,done=false;

/* NAV */
function next(s){
document.querySelectorAll(".card").forEach(x=>x.classList.add("hidden"));
document.getElementById("step"+s).classList.remove("hidden");
}

/* START */
function start(){
nama=document.getElementById("nama").value;
next(3);

let arr=["3","2","1","🎉"];
let i=0;

function run(){
if(i<arr.length){
document.getElementById("count").innerHTML=arr[i];
i++;
setTimeout(run,900);
}else{
confetti();
next(4);
type("t1","Happy Birthday Naeli 🎂💖 Selamat ulang tahun jangan terus meragukan diri sendiri kamu sudah cukup hebat selama ini✨");
}}
run();
}

/* TYPE */
function type(id,text){
let i=0;
let el=document.getElementById(id);
el.innerHTML="";
function t(){
if(i<text.length){
el.innerHTML+=text[i];
i++;
setTimeout(t,30);
}}
t();
}

/* STAR */
let box=document.getElementById("stars");
for(let i=0;i<5;i++){
let s=document.createElement("span");
s.innerHTML="⭐";
s.className="star";
s.onclick=function(){
if(done)return;
star++;
s.style.opacity="0.5";
if(star===5){
done=true;
next(6);
setTimeout(()=>{
next(7);
type("t2","Untuk Naeli, jangan pernah patah semangat. 🌟 Dunia mungkin terasa berat, tapi ingatlah bahwa diam tanpa usaha hanya akan menjauhkanmu dari mimpi. Teruslah melangkah, banyak senyum dan harapan orang-orang yang kamu sayangi untuk kamu kamu bahagiakan. Semoga semesta memeluk mimpimu dan menjadikannya nyata 💕✨");
},1500);
}}
box.appendChild(s);
}

/* MUSIC */
function toggle(){
let m=document.getElementById("musik");
m.paused?m.play():m.pause();
}

/* CONFETTI */
function confetti(){
for(let i=0;i<30;i++){
let c=document.createElement("div");
c.innerHTML="✨";
c.style.position="fixed";
c.style.left=Math.random()*100+"%";
c.style.top="0";
c.style.animation="fall 2s linear";
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}
</script>

</body>
</html>
