<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ucapan Pink 🎀</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(to bottom, #ffc0cb, #ff69b4);
    text-align: center;
    color: white;
    overflow: hidden;
}

.hidden { display: none; }

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #ff1493;
    color: white;
    margin-top: 15px;
}

/* LOVE jatuh */
.love {
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear infinite;
}
@keyframes fall {
    to { transform: translateY(100vh); }
}

/* FOTO */
.foto {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 5px solid white;
    object-fit: cover;
    animation: zoom 1s ease;
}
@keyframes zoom {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

/* bunga */
.flower {
    font-size: 60px;
    animation: bloom 1s infinite alternate;
}
@keyframes bloom {
    from { transform: scale(1); }
    to { transform: scale(1.4); }
}

/* countdown */
.countdown {
    font-size: 50px;
    font-weight: bold;
    animation: pop 0.5s;
}
@keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

/* typing */
.typing {
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://files.catbox.moe/9l4k7v.mp3">
</audio>

<!-- LOVE -->
<script>
for(let i=0;i<25;i++){
 let love=document.createElement("div");
 love.innerHTML="💖";
 love.className="love";
 love.style.left=Math.random()*100+"%";
 love.style.animationDuration=(3+Math.random()*5)+"s";
 document.body.appendChild(love);
}
</script>

<!-- STEP 1 -->
<div id="step1">
    <h1>💌 Klik Surat</h1>
    <button onclick="nextStep(2)">Buka</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
    <h2>Masukkan Nama 🎀</h2>
    <input id="nama">
    <br>
    <button onclick="startCountdown()">OK</button>
</div>

<!-- STEP 3 COUNTDOWN -->
<div id="step3" class="hidden">
    <div id="count" class="countdown"></div>
</div>

<!-- STEP 4 FOTO + UCAPAN -->
<div id="step4" class="hidden">
    <!-- GANTI FOTO DI SINI -->
    <img src="https://i.imgur.com/yourphoto.jpg" class="foto">
    <p id="text1" class="typing"></p>
    <br>
    <button onclick="nextStep(5)">Lihat lebih lanjut</button>
</div>

<!-- STEP 5 BINTANG -->
<div id="step5" class="hidden">
    <p>Klik 5 bintang ⭐</p>
    <div id="stars"></div>
</div>

<!-- STEP 6 -->
<div id="step6" class="hidden">
    <p>Tunggu ya... ⏳</p>
</div>

<!-- STEP 7 -->
<div id="step7" class="hidden">
    <div class="flower">🌸</div>
    <p id="text2" class="typing"></p>
    <br>
    <button onclick="nextStep(8)">Lanjut</button>
</div>

<!-- STEP 8 -->
<div id="step8" class="hidden">
    <h2>🎉 Sampai Jumpa 🎉</h2>
</div>

<script>
let namaUser="";
let star=0;

function nextStep(s){
 document.querySelectorAll("div").forEach(d=>d.classList.add("hidden"));
 document.getElementById("step"+s).classList.remove("hidden");
}

/* COUNTDOWN */
function startCountdown(){
 namaUser=document.getElementById("nama").value;
 nextStep(3);

 let angka=["3","2","1","🎉"];
 let i=0;

 function jalan(){
  if(i<angka.length){
    document.getElementById("count").innerHTML=angka[i];
    i++;
    setTimeout(jalan,1000);
  } else {
    nextStep(4);
    ketik("text1","Happy Birthday "+namaUser+" 🎂💖 Semoga panjang umur & bahagia selalu ✨");
  }
 }
 jalan();
}

/* typing */
function ketik(id,text){
 let i=0;
 let el=document.getElementById(id);
 el.innerHTML="";
 function jalan(){
  if(i<text.length){
    el.innerHTML+=text.charAt(i);
    i++;
    setTimeout(jalan,40);
  }
 }
 jalan();
}

/* bintang */
let starDiv=document.getElementById("stars");
for(let i=0;i<5;i++){
 let s=document.createElement("span");
 s.innerHTML="⭐";
 s.style.fontSize="30px";
 s.onclick=function(){
  star++;
  if(star>=5){
    nextStep(6);
    setTimeout(()=>{
      nextStep(7);
      ketik("text2","Semoga semua impian kamu tercapai 💕 tetap jadi orang baik ya 😆✨");
    },2000);
  }
 }
 starDiv.appendChild(s);
}
</script>

</body>
</html>
