<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Ulang Tahun Naeli 🎀</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ffeaf2,#ffd6e7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  width:90%;
  max-width:320px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;

  animation:fade 0.8s ease;
}
.hidden{display:none;}

@keyframes fade{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#ff6fae,#ff3d8b);
  color:white;
}

/* FOTO */
.foto{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}

/* GLOW */
.glow{
  color:#ff1493;
  text-shadow:0 0 10px #ff69b4,0 0 20px #ff1493;
}

/* STAR */
.star{font-size:30px;cursor:pointer;}

/* ENDING */
.ending-text{
  font-size:14px;
  line-height:1.9;
  white-space:pre-line;
}

.final-name{
  margin-top:20px;
  font-size:28px;
  color:#ff1493;
  opacity:0;
  animation:fadeName 2s forwards;
}
@keyframes fadeName{to{opacity:1;}}

.last-line{
  margin-top:15px;
  opacity:0;
  animation:fadeLast 3s forwards;
}
@keyframes fadeLast{to{opacity:1;}}
</style>
</head>

<body>

<audio id="musik" loop>
<source src="https://files.catbox.moe/9l4k7v.mp3">
</audio>

<!-- STEP -->
<div class="card" id="step1">
<h3>💌 Hai kamu</h3>
<button onclick="startApp()">Buka</button>
</div>

<div class="card hidden" id="step2">
<input id="nama" placeholder="Masukkan nama">
<br>
<button onclick="start()">OK</button>
</div>

<div class="card hidden" id="step3">
<h1 id="count"></h1>
</div>

<div class="card hidden" id="step4">
<img src="photo.jpeg" class="foto">
<p id="t1" class="glow"></p>
<button onclick="next(5)">Lanjut</button>
</div>

<div class="card hidden" id="step5">
<p>Klik 5 bintang ⭐</p>
<div id="stars"></div>
</div>

<div class="card hidden" id="step6">
<p>Loading...</p>
</div>

<div class="card hidden" id="step7">
<p id="t2" class="glow"></p>
<button onclick="showEnding()">Lanjut</button>
</div>

<!-- ENDING -->
<div class="card hidden" id="step8">
<p id="endText" class="ending-text"></p>
<h2 id="finalName" class="final-name hidden"></h2>
<p id="lastLine" class="last-line hidden"></p>

<button onclick="restart()">🔁 Ulangi</button>
<button onclick="toggle()">🔊 Musik</button>
</div>

<script>
let star=0,done=false;

/* START */
function startApp(){
document.getElementById("musik").play();
next(2);
}

/* NAV */
function next(s){
document.querySelectorAll(".card").forEach(x=>x.classList.add("hidden"));
document.getElementById("step"+s).classList.remove("hidden");
}

/* COUNTDOWN */
function start(){
next(3);
let arr=["3","2","1","🎉"];
let i=0;

function run(){
if(i<arr.length){
document.getElementById("count").innerHTML=arr[i++];
setTimeout(run,1000);
}else{
confetti();
next(4);
setTimeout(()=>{
type("t1","Happy Birthday Naeli 🎂💖 Kamu hebat... lebih dari yang kamu kira ✨");
},800);
}}
run();
}

/* TYPE NORMAL (SUDAH DIPERLAMBAT) */
function type(id,text){
let i=0,el=document.getElementById(id);
el.innerHTML="";
function t(){
if(i<text.length){
el.innerHTML+=text[i];

let d=90; // lebih pelan
if(text[i]==" ") d=50;
if(text[i]=="."||text[i]==",") d=700;

i++;
setTimeout(t,d);
}}
t();
}

/* STAR */
let box=document.getElementById("stars");
for(let i=0;i<5;i++){
let s=document.createElement("span");
s.innerHTML="⭐";
s.className="star";
s.onclick=function(){
if(done)return;
star++;
s.style.opacity="0.5";

if(star==5){
done=true;
next(6);
setTimeout(()=>{
next(7);
type("t2","Jangan menyerah ya... kamu kuat 💕");
},2000);
}}
box.appendChild(s);
}

/* ENDING SUPER DALAM */
function showEnding(){
next(8);

let text=`Selamat ulang tahun...

Kalau hari ini kamu capek,
itu nggak apa-apa.

Kalau kamu sedih,
itu juga nggak apa-apa.

Kamu nggak harus selalu kuat...

Tapi kamu masih di sini...
dan itu sudah hebat.

Terima kasih sudah bertahan...`;

typeSlow("endText",text);

/* nama muncul */
setTimeout(()=>{
let n=document.getElementById("finalName");
n.innerHTML="💖 Naeli 💖";
n.classList.remove("hidden");
},14000);

/* penutup terakhir */
setTimeout(()=>{
let l=document.getElementById("lastLine");
l.innerHTML="aku harap... suatu hari nanti kamu benar-benar bahagia 🤍";
l.classList.remove("hidden");
},18000);

fadeMusic();
}

/* TYPE SUPER SLOW */
function typeSlow(id,text){
let i=0,el=document.getElementById(id);
el.innerHTML="";
function t(){
if(i<text.length){
el.innerHTML+=text[i];

let d=130; // SUPER PELAN
if(text[i]=="\n") d=800;
if(text[i]=="."||text[i]==",") d=1200;

i++;
setTimeout(t,d);
}}
t();
}

/* MUSIC */
function toggle(){
let m=document.getElementById("musik");
m.paused?m.play():m.pause();
}

function fadeMusic(){
let m=document.getElementById("musik");
let v=m.volume;
let f=setInterval(()=>{
if(v>0.05){v-=0.05;m.volume=v;}
else clearInterval(f);
},500);
}

/* CONFETTI */
function confetti(){
for(let i=0;i<20;i++){
let c=document.createElement("div");
c.innerHTML="✨";
c.style.position="fixed";
c.style.left=Math.random()*100+"%";
c.style.top="0";
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}

/* RESTART */
function restart(){
location.reload();
}
</script>

</body>
</html>
