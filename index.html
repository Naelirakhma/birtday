<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Ulang Tahun Naeli 🎀</title>

<style>
:root{
  --pink:#ff6fae;
  --deep:#ff3d8b;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ffeaf2,#ffd6e7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* CARD */
.card{
  width:90%;
  max-width:320px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
  animation:fade 0.5s ease;
}
.hidden{display:none;}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,var(--pink),var(--deep));
  color:white;
  cursor:pointer;
}

/* FOTO */
.foto{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 15px pink;
}

/* COUNT */
.count{
  font-size:60px;
  color:var(--deep);
}

/* GLOW TEXT */
.glow{
  color:#ff1493;
  text-shadow:
    0 0 5px #ff69b4,
    0 0 10px #ff69b4,
    0 0 20px #ff1493;
}

/* JEDAG */
.jedag{
  animation:jedag 0.15s;
}
@keyframes jedag{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* STAR */
.star{
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MUSIK -->
<audio id="musik" loop>
<source src="https://files.catbox.moe/9l4k7v.mp3">
</audio>

<!-- SOUND TYPING -->
<audio id="typingSound">
<source src="https://www.soundjay.com/mechanical/keyboard-1.mp3">
</audio>

<!-- STEP -->
<div class="card" id="step1">
<h3>💌 Hai kamu</h3>
<p>Ada sesuatu spesial 😳</p>
<button onclick="startApp()">Buka</button>
</div>

<div class="card hidden" id="step2">
<h3>Masukkan Nama 🎀</h3>
<input id="nama">
<br>
<button onclick="start()">OK</button>
</div>

<div class="card hidden" id="step3">
<div class="count" id="count"></div>
</div>

<div class="card hidden" id="step4">
<img src="photo.jpeg" class="foto">
<p id="t1" class="glow"></p>
<button onclick="next(5)">Lanjut</button>
</div>

<div class="card hidden" id="step5">
<p>Klik 5 bintang ⭐</p>
<div id="stars"></div>
</div>

<div class="card hidden" id="step6">
<p>Loading... ✨</p>
</div>

<div class="card hidden" id="step7">
<p id="t2" class="glow"></p>
<button onclick="next(8)">Lanjut</button>
</div>

<div class="card hidden" id="step8">
<h2>🎉 Sampai Jumpa 🎉</h2>
<button onclick="toggle()">🔊 Musik</button>
</div>

<script>
let nama="",star=0,done=false;

/* START APP (biar musik bisa play) */
function startApp(){
document.getElementById("musik").play();
next(2);
}

/* NAV */
function next(s){
document.querySelectorAll(".card").forEach(x=>x.classList.add("hidden"));
document.getElementById("step"+s).classList.remove("hidden");
}

/* COUNTDOWN */
function start(){
nama=document.getElementById("nama").value;
next(3);

let arr=["3","2","1","🎉"];
let i=0;

function run(){
if(i<arr.length){
document.getElementById("count").innerHTML=arr[i];
i++;
setTimeout(run,900);
}else{
confetti();
next(4);
setTimeout(()=>{
type("t1","Happy Birthday Naeli 🎂💖 Kamu itu kuat, lebih dari yang kamu kira ✨");
},500);
}}
run();
}

/* TYPE EFFECT */
function type(id,text){
let i=0;
let el=document.getElementById(id);
let sound=document.getElementById("typingSound");

el.innerHTML="";

function t(){
 if(i<text.length){
   el.innerHTML+=text[i];

   // SOUND tiap 2 huruf (biar ga berisik)
   if(i%2===0){
     sound.currentTime=0;
     sound.play();
   }

   // JEDAG
   el.classList.add("jedag");
   setTimeout(()=>el.classList.remove("jedag"),100);

   let delay=35;
   if(text[i]===" " ) delay=15;
   if(text[i]==="."||text[i]===",") delay=250;

   i++;
   setTimeout(t,delay);
 }
}
t();
}

/* STAR */
let box=document.getElementById("stars");
for(let i=0;i<5;i++){
let s=document.createElement("span");
s.innerHTML="⭐";
s.className="star";

s.onclick=function(){
if(done)return;
star++;
s.style.opacity="0.5";

if(star===5){
done=true;
next(6);
setTimeout(()=>{
next(7);
type("t2","Jangan pernah menyerah ya... semua impianmu akan tercapai 💕✨");
},1500);
}}
box.appendChild(s);
}

/* MUSIC */
function toggle(){
let m=document.getElementById("musik");
m.paused?m.play():m.pause();
}

/* CONFETTI */
function confetti(){
for(let i=0;i<20;i++){
let c=document.createElement("div");
c.innerHTML="✨";
c.style.position="fixed";
c.style.left=Math.random()*100+"%";
c.style.top="0";
c.style.animation="fall 2s linear";
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}
</script>

</body>
</html>
